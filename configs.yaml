app:
  name: "Enterprise AI Knowledge Assistant"
  version: "2.0.0"
  description: "Multi-document RAG powered by Ollama"
  author: "Mohd Abdul Razzaq"
  theme: "dark"

ollama:
  base_url: "http://localhost:11434"
  llm_model: "llama3.2:3b"
  embedding_model: "nomic-embed-text"
  temperature: 0.1
  max_tokens: 2048
  streaming: true

vectorstore:
  type: "chromadb"
  persist_directory: "data/vectorstore"
  collection_name: "knowledge_base"
  chunk_size: 1000
  chunk_overlap: 200
  top_k_results: 5

loaders:
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".md"
    - ".csv"
  max_file_size_mb: 50
  url_timeout_seconds: 30

ui:
  page_title: "AI Knowledge Assistant"
  page_icon: "🧠"
  layout: "wide"
  sidebar_width: 350
  max_chat_history: 50
  show_sources: true
  show_confidence: true
  streaming_enabled: true

logging:
  level: "INFO"
  log_file: "logs/app.log"
  max_file_size_mb: 10